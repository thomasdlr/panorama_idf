server {
    listen 80;

    types {
        application/json geojson json;
    }

    location / {
        # Sert les GeoJSON écrits par le pipeline dans /srv/panorama-data/metabase
        # (volume Docker partagé entre les services pipeline et geojson).
        root /srv/panorama-data/metabase;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers "*";
    }

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
