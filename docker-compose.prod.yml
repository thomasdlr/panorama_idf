services:
  postgres:
    image: postgres:16-alpine
    container_name: panorama_idf_pg
    # Expose uniquement sur la loopback du VPS pour que setup_metabase.py
    # (lance depuis l'hote) puisse se connecter. Pas accessible depuis internet.
    ports:
      - "127.0.0.1:5480:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-panorama_idf}
      POSTGRES_USER: ${POSTGRES_USER:-metabase}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-metabase} -d ${POSTGRES_DB:-panorama_idf}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  metabase:
    image: metabase/metabase:latest
    container_name: panorama_idf_metabase
    depends_on:
      postgres:
        condition: service_healthy
    # Idem : bind localhost uniquement, le trafic public passe par Caddy.
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase_app
      MB_DB_PORT: 5432
      MB_DB_USER: ${POSTGRES_USER:-metabase}
      MB_DB_PASS: ${POSTGRES_PASSWORD}
      MB_DB_HOST: postgres
      MB_SITE_URL: https://${DOMAIN}
      MB_ENABLE_PUBLIC_SHARING: "true"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  geojson:
    image: nginx:alpine
    container_name: panorama_idf_geojson
    volumes:
      - ./data/metabase:/usr/share/nginx/html:ro
      - ./data/metabase/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: panorama_idf_caddy
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
      EMAIL: ${EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - metabase
      - geojson
    restart: unless-stopped

volumes:
  pg-data:
  caddy-data:
  caddy-config:
