version: 2

exposures:
  - name: metabase_dashboard_panorama_idf
    type: dashboard
    maturity: medium
    url: http://localhost:3000/dashboard/2
    description: >
      Dashboard Metabase « Panorama Ile-de-France ».
      3 onglets (IDF, Paris, Petite couronne) avec cartes choroplethe,
      prix, loyers, delinquance, demographie et revenus.
      Alimente par export PostgreSQL des marts + stg_delinquance_detail.
    depends_on:
      - ref('mart_immo__accessibilite_commune')
      - ref('mart_immo__synthese_zone')
      - ref('mart_immo__evolution_prix')
      - ref('stg_logement__delinquance_detail')
    owner:
      name: Thomas de Lard
      email: thomas.delard@gmail.com
