version: 2

exposures:
  - name: metabase_dashboard_immobilier_idf
    type: dashboard
    maturity: medium
    url: http://localhost:3000/dashboard/5
    description: >
      Dashboard Metabase « Immobilier Ile-de-France ».
      3 onglets (IDF, Paris, Petite couronne) avec cartes choroplethe,
      evolutions de prix, volumes de ventes et demographie.
      Alimente par export PostgreSQL des marts.
    depends_on:
      - ref('mart_immo__accessibilite_commune')
      - ref('mart_immo__ranking_tension')
      - ref('mart_immo__synthese_zone')
      - ref('mart_immo__evolution_prix')
    owner:
      name: Thomas Delard
      email: contact@france-aujourdhui.fr

  - name: site_editorial_idf
    type: application
    maturity: low
    description: >
      Site editorial « France Aujourd'hui » — articles, cartes et classements
      sur l'accessibilite immobiliere en Ile-de-France.
    depends_on:
      - ref('mart_immo__accessibilite_commune')
      - ref('mart_immo__ranking_tension')
      - ref('mart_immo__synthese_zone')
      - ref('mart_immo__evolution_prix')
    owner:
      name: Thomas Delard
      email: contact@france-aujourdhui.fr
