version: 2

models:
  - name: stg_dvf__stats_communales
    description: >
      Statistiques DVF agrégées, nettoyées.
      Grain : entité géographique (commune, EPCI, département) — pas de dimension année.
    columns:
      - name: code_geo
        description: Code INSEE de l'entité géographique
        tests:
          - not_null
      - name: echelle_geo
        description: "Échelle : commune, epci, departement"
      - name: nb_ventes_appartement
        description: Nombre de ventes d'appartements
      - name: prix_m2_median_appartement
        description: Prix médian au m² appartements (euros)
      - name: nb_ventes_maison
        description: Nombre de ventes de maisons
      - name: prix_m2_median_maison
        description: Prix médian au m² maisons (euros)

  - name: stg_dvf__mutations_idf
    description: >
      Mutations DVF géolocalisées individuelles pour l'Île-de-France, nettoyées.
      Source geo-dvf (data.gouv.fr). Ne contient PAS l'âge de l'acquéreur.
      Grain : mutation.
    columns:
      - name: id_mutation
        description: Identifiant unique de la mutation
      - name: date_mutation
        description: Date de la mutation
      - name: code_commune
        description: Code INSEE de la commune
        tests:
          - not_null
      - name: type_local
        description: "Type de bien : Appartement, Maison, Local industriel/commercial, Dépendance"
      - name: valeur_fonciere
        description: Montant de la transaction (euros)
      - name: surface_bati
        description: Surface réelle du bâti (m²)
