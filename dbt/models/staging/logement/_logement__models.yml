version: 2

models:
  - name: stg_logement__loyers_communes
    description: >
      Loyers predits au m2 par commune (appartements, 2025).
      Source : carte des loyers ANIL. Valeurs en euros/m2/mois.
    columns:
      - name: code_commune
        description: Code INSEE
        tests: [not_null]
      - name: loyer_m2_median
        description: Loyer predit au m2/mois (EUR)

  - name: stg_logement__delinquance_communes
    description: >
      Taux de delinquance par commune et annee.
      Agregation des principaux indicateurs en un taux global pour 1000 habitants.
      Secret statistique : communes avec < 6 faits exclues de certains indicateurs.
    columns:
      - name: code_commune
        description: Code INSEE
        tests: [not_null]
      - name: annee
        description: Annee (2016-2024)
      - name: taux_delinquance_pour_mille
        description: Total des faits constates pour 1000 habitants

  - name: stg_logement__delinquance_detail
    description: >
      Delinquance par commune, annee et type de delit.
      Detail par indicateur (cambriolages, violences, vols, etc.).
      Exporte vers PostgreSQL pour les graphiques Metabase par type de delit.
    columns:
      - name: code_commune
        description: Code INSEE
        tests: [not_null]
      - name: annee
        description: Annee (2016-2024)
      - name: type_delit
        description: Libelle du type de delit (indicateur SSMSI)
      - name: nb_faits
        description: Nombre de faits constates
      - name: taux_pour_mille
        description: Taux pour 1000 habitants
