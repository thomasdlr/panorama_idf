name: france_aujourdhui
version: "0.1.0"
config-version: 2

profile: france_aujourdhui

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]
asset-paths: ["assets"]

target-path: target
clean-targets:
  - target
  - dbt_packages

seeds:
  france_aujourdhui:
    zones_idf:
      +column_types:
        code_departement: varchar

vars:
  # Seuils de filtrage DVF (int_immo__prix_commune_annee)
  dvf_prix_min: 1000
  dvf_prix_max: 50000000
  dvf_surface_min: 5
  dvf_surface_max: 5000
  dvf_annee_min: 2018
  # Seuil minimum de ventes pour inclure une commune
  communes_nb_ventes_min: 5

models:
  france_aujourdhui:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
    marts:
      +materialized: table
      +schema: marts
