# Panorama Ile-de-France — stack unique (dev local + prod Dokploy)
#
# Services longue-durée :
#   - postgres  : DB pour Metabase (appdb + marts exportés)
#   - metabase  : dashboard → sous-domaine metabase.tdelard.me en prod
#   - geojson   : nginx servant les GeoJSON des cartes
#   - landing   : page d'accueil → tdelard.me en prod
#                 (injecte UMAMI_WEBSITE_ID au démarrage pour l'analytics)
#   - admin     : page d'admin avec liens vers Metabase/Umami/Tally/GitHub
#                 → admin.tdelard.me en prod, protégée par basic auth
#                 (variables ADMIN_USER, ADMIN_PASSWORD dans .env)
#
# Service one-shot (profile "pipeline") :
#   - pipeline  : ingest + dbt build + setup Metabase.
#                 À lancer via `docker compose run --rm pipeline`
#                 (manuellement ou via un schedule Dokploy mensuel).
#
# Les ports sont bindés sur 127.0.0.1 : accessibles en local mais jamais
# exposés sur internet. Dokploy route le trafic public via Traefik sur le
# réseau Docker interne (labels ajoutés via l'UI Dokploy, pas ici).

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:5480:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-panorama_idf}
      POSTGRES_USER: ${POSTGRES_USER:-metabase}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-metabase}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-metabase} -d ${POSTGRES_DB:-panorama_idf}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  metabase:
    image: metabase/metabase:latest
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase_app
      MB_DB_PORT: 5432
      MB_DB_USER: ${POSTGRES_USER:-metabase}
      MB_DB_PASS: ${POSTGRES_PASSWORD:-metabase}
      MB_DB_HOST: postgres
      MB_SITE_URL: ${METABASE_SITE_URL:-http://localhost:3000}
      MB_ENABLE_PUBLIC_SHARING: "true"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.metabase.rule=Host(`metabase.tdelard.me`)"
      - "traefik.http.routers.metabase.entrypoints=websecure"
      - "traefik.http.routers.metabase.tls.certresolver=letsencrypt"
      - "traefik.http.services.metabase.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  geojson:
    build:
      context: ./geojson
    expose:
      - "80"
    volumes:
      - ./data/metabase:/usr/share/nginx/html:ro
    restart: unless-stopped

  landing:
    build:
      context: ./landing
    expose:
      - "80"
    environment:
      UMAMI_WEBSITE_ID: ${UMAMI_WEBSITE_ID:-}
      DASHBOARD_URL: ${DASHBOARD_URL:-http://localhost:3000/dashboard/2}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.landing.rule=Host(`tdelard.me`) || Host(`www.tdelard.me`)"
      - "traefik.http.routers.landing.entrypoints=websecure"
      - "traefik.http.routers.landing.tls.certresolver=letsencrypt"
      - "traefik.http.services.landing.loadbalancer.server.port=80"
    restart: unless-stopped

  admin:
    build:
      context: ./admin
    expose:
      - "80"
    environment:
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-dev-change-me}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.admin.rule=Host(`admin.tdelard.me`)"
      - "traefik.http.routers.admin.entrypoints=websecure"
      - "traefik.http.routers.admin.tls.certresolver=letsencrypt"
      - "traefik.http.services.admin.loadbalancer.server.port=80"
    restart: unless-stopped

  pipeline:
    profiles: ["pipeline"]
    build:
      context: .
      dockerfile: Dockerfile.pipeline
    depends_on:
      postgres:
        condition: service_healthy
      metabase:
        condition: service_started
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-panorama_idf}
      POSTGRES_USER: ${POSTGRES_USER:-metabase}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-metabase}
      METABASE_URL: http://metabase:3000
      MB_ADMIN_EMAIL: ${MB_ADMIN_EMAIL}
      MB_ADMIN_PASSWORD: ${MB_ADMIN_PASSWORD}
      SKIP_COMPOSE_START: "1"
    volumes:
      - ./data:/app/data
    restart: "no"

  # Caddy = reverse proxy LOCAL uniquement (profil "local").
  # En prod, c'est Traefik (piloté par Dokploy) qui fait le routing.
  # Démarrage local : `docker compose --profile local up -d`
  caddy:
    profiles: ["local"]
    image: caddy:2-alpine
    container_name: panorama_idf_caddy
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./Caddyfile.local:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - metabase
      - geojson
      - admin
      - landing

volumes:
  pg-data:
  caddy-data:
  caddy-config:
