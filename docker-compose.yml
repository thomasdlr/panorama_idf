services:
  postgres:
    image: postgres:16-alpine
    container_name: france_aujourdhui_pg
    environment:
      POSTGRES_DB: france_aujourdhui
      POSTGRES_USER: metabase
      POSTGRES_PASSWORD: metabase
    ports:
      - "5480:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metabase -d france_aujourdhui"]
      interval: 5s
      timeout: 3s
      retries: 10

  metabase:
    image: metabase/metabase:latest
    container_name: france_aujourdhui_metabase
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase_app
      MB_DB_PORT: 5432
      MB_DB_USER: metabase
      MB_DB_PASS: metabase
      MB_DB_HOST: postgres
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  geojson:
    image: nginx:alpine
    container_name: france_aujourdhui_geojson
    ports:
      - "8081:80"
    volumes:
      - ./data/metabase:/usr/share/nginx/html:ro
      - ./data/metabase/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  pg-data:
